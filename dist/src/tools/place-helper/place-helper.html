<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒險地圖助手 | 地點錄入工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script type="module" crossorigin src="/assets/place-helper-B2ZjNTZL.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-BnkOoLKg.js">
  <link rel="stylesheet" crossorigin href="/assets/place-helper-DQJBb7sX.css">
</head>
<body>
    <div class="nav-tabs" id="nav-tabs">
        <div class="nav-tab active" id="tab-add" onclick="switchMode('add')">新增地點</div>
        <div class="nav-tab" id="tab-mgmt" onclick="switchMode('mgmt')">管理地點</div>
    </div>

    <!-- 新增地點面板 -->
    <div class="container" id="add-panel">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                地點助手
            </div>
            <div id="file-zone" class="file-connector">
                <span id="file-status" class="file-status">尚未連接 places.json</span>
                <button onclick="pickFile()" class="btn-connect">選擇檔案</button>
            </div>
        </header>

        <section class="main-layout">
            <div class="form-side">
                <div class="form-card">
                    <div class="search-bar">
                        <input type="text" id="s-input" placeholder="搜尋地名或地址 (例如: 象山步道)">
                        <button onclick="doSearch()" id="s-btn">搜尋</button>
                        <div id="s-results" class="search-results"></div>
                    </div>
                    <div id="s-status" class="search-status"></div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label>地點名稱 *</label>
                            <input type="text" id="f-name" placeholder="例如: 某某特色咖啡廳">
                        </div>
                        <div class="input-group">
                            <label>推薦原因 (Why)</label>
                            <input type="text" id="f-why" placeholder="一句話推薦理由">
                        </div>
                        <div class="input-group">
                            <label>最佳時段</label>
                            <input type="text" id="f-time" placeholder="例如: 平日午後、清晨">
                        </div>
                        <div class="input-group">
                            <label>加入月份</label>
                            <input type="month" id="f-added">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>分類 (Category)</label>
                        <div class="cat-selector">
                            <button class="cat-btn on" data-c="food">美食</button>
                            <button class="cat-btn" data-c="scenery">風景</button>
                            <button class="cat-btn" data-c="oldshop">老店</button>
                            <button class="cat-btn" data-c="walk">散步</button>
                            <button class="cat-btn" data-c="cafe">咖啡廳</button>
                            <button class="cat-btn" data-c="shop">購物</button>
                            <button class="cat-btn" data-c="stay">住宿</button>
                            <button class="cat-btn" data-c="quest">破關任務</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>狀態 (Status)</label>
                        <div class="status-selector">
                            <button class="st-btn on" data-s="pending">Pending (想去)</button>
                            <button class="st-btn" data-s="done">Done (已去過)</button>
                        </div>
                    </div>

                    <div id="done-extra" class="done-section">
                        <div class="input-group">
                            <label>你的評分</label>
                            <div class="rate-selector">
                                <button class="rate-btn" data-v="1">1</button>
                                <button class="rate-btn" data-v="2">2</button>
                                <button class="rate-btn" data-v="3">3</button>
                                <button class="rate-btn" data-v="4">4</button>
                                <button class="rate-btn" data-v="5">5</button>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>造訪紀錄</label>
                            <div class="visit-form">
                                <input type="date" id="v-date">
                                <textarea id="v-note" placeholder="當次心得 (必填)" rows="2"></textarea>
                                <button type="button" onclick="addVisitToCurrent()" class="btn-add-v">新增造訪</button>
                            </div>
                            <div id="visit-list" class="visit-list-box"></div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>推薦季節 (可多選)</label>
                        <div class="season-selector">
                            <button class="season-btn" data-v="spring">春</button>
                            <button class="season-btn" data-v="summer">夏</button>
                            <button class="season-btn" data-v="autumn">秋</button>
                            <button class="season-btn" data-v="winter">冬</button>
                            <button class="season-btn" data-v="all">全年</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>詳細地址 / 地標資訊</label>
                        <input type="text" id="f-addr" placeholder="自動抓取或手動輸入">
                    </div>

                    <div class="input-group">
                        <label>關於這邊 (Description)</label>
                        <textarea id="f-desc" rows="3" placeholder="詳細描述、交通方式等..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>冷知識 (Trivia)</label>
                        <textarea id="f-trivia" rows="2" placeholder="有趣的小故事、歷史背景..."></textarea>
                    </div>

                    <div class="input-group">
                        <div class="photo-header">
                            <label>地點照片 (自動存到 images/places)</label>
                            <button onclick="pickImgDir()" class="btn-dir-link" title="一次性授權目標資料夾，即可自動存檔">🔗 連結錄入目錄</button>
                        </div>
                        <div id="dir-status" class="dir-status">尚未連結目錄，照片將僅產生路徑不存檔</div>
                        <div class="photo-uploader" onclick="addPhotos()" id="drop-zone">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span>點擊或拖曳照片到此處</span>
                        </div>
                        <div id="photo-preview" class="photo-preview-grid"></div>
                    </div>
                </div>
            </div>

            <div class="map-side">
                <div class="map-container">
                    <div id="picker-map"></div>
                    <div class="map-overlay">
                        <div id="coord-pill" class="coord-pill" style="display:none">0, 0</div>
                        <div id="map-tip" class="map-tip">點擊地圖選取精確位置</div>
                        <button onclick="locateMe()" class="btn-locate" title="我的位置">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="action-card">
                    <div class="latlng-fields">
                        <input type="text" id="f-lat" placeholder="緯度 (Lat)" readonly>
                        <input type="text" id="f-lng" placeholder="經度 (Lng)" readonly>
                    </div>
                    <button id="btn-write" class="btn-main" onclick="generateAndWrite()" disabled>
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        生成並寫入 places.json
                    </button>
                    <p class="btn-hint">※ 功能需在支援 File System API 的瀏覽器 (Chrome/Edge) 執行</p>
                </div>
            </div>
        </section>
    </div>

    <!-- 管理地點面板 -->
    <div class="container mgmt-panel" id="mgmt-panel">
        <header>
            <div class="logo">管理地點庫</div>
            <div id="mgmt-file-zone" class="file-connector">
                <span id="mgmt-status" class="file-status">尚未讀取資料</span>
                <button onclick="loadPlacesForMgmt()" class="btn-connect">開啟 places.json</button>
            </div>
        </header>

        <div class="mgmt-body">
            <div class="mgmt-filter-bar">
                <input type="text" id="mgmt-filter" placeholder="搜尋名稱..." oninput="renderMgmtList()">
            </div>
            <ul id="place-list" class="place-list">
                <!-- 由 JS 渲染 -->
                <li class="mgmt-empty">請先開啟檔案</li>
            </ul>
        </div>
    </div>

    <div id="toast" class="toast"></div>

</body>
</html>
